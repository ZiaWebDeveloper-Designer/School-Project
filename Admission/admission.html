<!DOCTYPE html>

<head>

    <title>Admissions - Web Developer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-container container">
            <div class="logo">
                <h2>The Citizen Foundation <span style="font-size: 10px;">(sy)</span> School</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="/Admission/admission.html">Admissions</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Admission Form -->
    <div class="admission">
        <h1>Admission Form</h1>
    </div>
    <section class="left left-container">

        <div class="form">
            <form action="#">

                <input type="text" name="Name" id="Name" placeholder="Enter Student Name" required>

                <input type="text" name="father name" id="father_name" placeholder="Enter Father Name" required>

                <input type="email" name="Email" id="email" placeholder="abc@gamil.com" required>

                <input type="tel" name="Phone" id="phone" placeholder="+1 342 48769" required>

                <select id="" required>
                    <option value="class">Select Class</option>
                    <option value="1st">1st Class</option>
                    <option value="1st">2nd Class</option>
                    <option value="1st">3rd Class</option>
                    <option value="1st">4th Class</option>
                    <option value="1st">5th Class</option>
                    <option value="1st">6th Class</option>
                    <option value="1st">7th Class</option>
                    <option value="1st">8th Class</option>
                    <option value="1st">9th Class</option>
                    <option value="1st">10th Class</option>
                </select>

               <textarea name="Massage" id="massage" placeholder="Massage"></textarea>

                <button>Submit Application</button>
        </div>
        </form>

        <!-- Contect Information -->

        <div class="contact-container right">
            <h2>Contact Informaton</h2>
            <p><strong>Address:</strong> Main Street, Lahore, Pakistan </p>
            <p><strong>Phone:</strong> +1 234 56789 </p>
            <p><strong>Email:</strong> info@tcf.com </p>
        </div>
    </section>
